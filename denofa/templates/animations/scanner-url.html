<style>
  @keyframes dot-blink {
    0%   { opacity: 0.2; }
    20%  { opacity: 1; }
    100% { opacity: 0.2; }
  }
  @keyframes corner-pulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.35; }
  }
  @keyframes su-scan-move {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(264px); }
  }
  @keyframes su-clip-black-shrink {
    0%, 100% { transform: scaleX(1); }
    50%      { transform: scaleX(0); }
  }
  @keyframes su-clip-blue-grow {
    0%, 100% { transform: scaleX(0); }
    50%      { transform: scaleX(1); }
  }

  .scanner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    gap: 12px;
    width: 100%;
  }
  .scanner-svg {
    width: 100%;
    max-width: 90px;
    height: auto;
    aspect-ratio: 323 / 292;
  }
  .corner { animation: corner-pulse 4s ease-in-out infinite; }

  /* Barra horizontal */
  .su-scan-bar {
    animation: su-scan-move 4s linear infinite;
  }
  /* Clip negro: se encoge desde el borde derecho */
  .su-clip-n-rect {
    transform-origin: 269px 166px;
    animation: su-clip-black-shrink 4s linear infinite;
  }
  /* Clip celeste: crece desde el borde izquierdo */
  .su-clip-c-rect {
    transform-origin: 5px 166px;
    animation: su-clip-blue-grow 4s linear infinite;
  }

  .scan-label {
    font-size: 11px;
    color: var(--color-text-muted);
    display: flex;
    align-items: center;
  }
  .dot {
    display: inline-block;
    animation: dot-blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
</style>

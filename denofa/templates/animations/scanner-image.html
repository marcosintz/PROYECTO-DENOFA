<style>
  @keyframes dot-blink {
    0%   { opacity: 0.2; }
    20%  { opacity: 1; }
    100% { opacity: 0.2; }
  }
  @keyframes corner-pulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.35; }
  }
  @keyframes scan-move {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(215px); }
  }
  @keyframes clip-scale {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(0); }
  }

  .scanner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    gap: 12px;
    width: 100%;
  }
  .scanner-svg { 
    width: 100%; 
    max-width: 90px; 
    height: auto; 
    aspect-ratio: 312 / 292;
  }
  .corner { animation: corner-pulse 4s ease-in-out infinite; }
  .scan-bar {
    animation: scan-move 4s linear infinite;
  }
  .scan-clip {
    transform-origin: 0 255px;
    animation: clip-scale 4s linear infinite;
  }
  .scan-label {
    font-size: 11px;
    color: var(--color-text-muted);
    display: flex;
    align-items: center;
  }
  .dot {
    display: inline-block;
    animation: dot-blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
</style>

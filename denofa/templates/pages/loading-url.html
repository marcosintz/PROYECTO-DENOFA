{% extends 'base/_base.html' %}
{% load static %}

{% block title %}Analizando enlace web...{% endblock %}

{% block content %}
<section class="page-canvas">
  <div class="container" style="display:flex; flex-direction:column; align-items:center;">
    <div class="card">
      <h1 style="font-size: 22px; margin-bottom: var(--space-md);">Analizando enlace web...</h1>
      
      <div class="url-preview" aria-label="Vista previa del enlace">
        <div class="url-preview__row">
          <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 7H8M8 7C8 8.657 6.657 10 5 10C3.343 10 2 8.657 2 7C2 5.343 3.343 4 5 4H8M8 7C8 5.343 9.343 4 11 4H15C16.657 4 18 5.343 18 7C18 8.657 16.657 10 15 10H11C9.343 10 8 8.657 8 7Z" stroke="#6e7881" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span id="url-display" class="url-preview__text">https://www.ejemplo.com/...</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-bar__fill progress-bar__fill--loading"></div>
        </div>
        <p id="url-status" style="font-size: 14px; color: var(--color-text-muted);">Accediendo al contenido del enlace...</p>
      </div>

      <ul id="steps-list" class="steps-list" aria-live="polite" aria-label="Pasos de verificación"></ul>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script type="module" src="{% static 'js/utils.js' %}"></script>
<script type="module" src="{% static 'js/loading.js' %}"></script>
<script type="module">
  // Extraer url de querystring para llenar url-display
  const params = new URLSearchParams(window.location.search);
  const url = params.get('url');
  if (url) {
    const display = document.getElementById('url-display');
    if (display) display.textContent = decodeURIComponent(url);
  }
</script>
{% endblock %}
